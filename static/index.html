<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Договорная торговля</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:        var(--tg-theme-bg-color,        #ffffff);
      --bg2:       var(--tg-theme-secondary-bg-color, #f2f2f7);
      --text:      var(--tg-theme-text-color,       #000000);
      --hint:      var(--tg-theme-hint-color,       #8e8e93);
      --link:      var(--tg-theme-link-color,       #007aff);
      --accent:    var(--tg-theme-button-color,     #007aff);
      --btn-text:  var(--tg-theme-button-text-color,#ffffff);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 72px;
      font-size: 16px;
    }

    /* ─── Header ─────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg2);
      padding: 12px 16px 10px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,.08);
    }
    .header-title { font-size: 17px; font-weight: 600; flex: 1; }
    .header-badge {
      background: var(--accent);
      color: var(--btn-text);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ─── Bottom nav ──────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--bg2);
      border-top: 1px solid rgba(0,0,0,.08);
      display: flex;
    }
    .nav-item {
      flex: 1; padding: 8px 4px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      color: var(--hint); font-size: 10px; font-weight: 500;
      transition: color .15s;
    }
    .nav-item .nav-icon { font-size: 22px; line-height: 1; }
    .nav-item.active { color: var(--accent); }

    /* ─── Pages ───────────────────────────────────────── */
    .page { display: none; }
    .page.active { display: block; animation: fadeIn .15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    /* ─── Cards & Lists ───────────────────────────────── */
    .section { margin: 16px; }
    .section-header {
      font-size: 13px; font-weight: 600;
      color: var(--hint); text-transform: uppercase; letter-spacing: .4px;
      padding: 0 4px 8px;
    }
    .list { background: var(--bg2); border-radius: var(--radius); overflow: hidden; }
    .list-item {
      padding: 13px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: opacity .1s;
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:active { opacity: .6; }
    .list-item-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
    .list-item-body { flex: 1; min-width: 0; }
    .list-item-title { font-size: 15px; font-weight: 500; }
    .list-item-sub { font-size: 13px; color: var(--hint); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item-right { text-align: right; flex-shrink: 0; }
    .list-item-price { font-size: 15px; font-weight: 600; color: var(--accent); }
    .chevron { color: var(--hint); font-size: 13px; margin-left: 4px; }

    /* ─── Buttons ─────────────────────────────────────── */
    .btn {
      width: 100%; padding: 14px;
      border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: opacity .15s; letter-spacing: .1px;
    }
    .btn:active { opacity: .8; }
    .btn-primary { background: var(--accent); color: var(--btn-text); }
    .btn-success { background: #34c759; color: #fff; }
    .btn-danger  { background: #ff3b30; color: #fff; }
    .btn-ghost   { background: var(--bg2); color: var(--text); }
    .btn-gap { margin-top: 10px; }
    .btn-sm { padding: 10px; font-size: 14px; }

    /* ─── Form ────────────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; color: var(--hint); margin-bottom: 6px; display: block; font-weight: 500; }
    .input {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid rgba(0,0,0,.1);
      border-radius: var(--radius);
      background: var(--bg2);
      color: var(--text); font-size: 15px;
      outline: none; transition: border-color .15s;
    }
    .input:focus { border-color: var(--accent); }
    select.input { cursor: pointer; }
    textarea.input { resize: none; min-height: 80px; }
    .row { display: flex; gap: 10px; }
    .row .form-group { flex: 1; }

    /* ─── Status badge ────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .badge-new       { background: #e8f4ff; color: #0071e3; }
    .badge-reviewing { background: #fff4e5; color: #c86000; }
    .badge-accepted  { background: #e6f9ed; color: #1a8a39; }
    .badge-rejected  { background: #fff0f0; color: #d70015; }
    .badge-completed { background: #f3e8ff; color: #6e33c4; }

    /* ─── Sheets (bottom drawer) ──────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.45);
      display: none; align-items: flex-end;
    }
    .overlay.open { display: flex; animation: fadeIn .15s; }
    .sheet {
      background: var(--bg); border-radius: 16px 16px 0 0;
      padding: 16px 16px 40px;
      width: 100%; max-height: 88vh; overflow-y: auto;
    }
    .sheet-handle {
      width: 36px; height: 4px;
      background: rgba(0,0,0,.15); border-radius: 2px;
      margin: 0 auto 14px;
    }
    .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }

    /* ─── Product detail card ─────────────────────────── */
    .detail-row {
      display: flex; justify-content: space-between;
      padding: 11px 0; border-bottom: 1px solid rgba(0,0,0,.06);
      font-size: 15px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--hint); }
    .detail-value { font-weight: 500; }

    /* ─── Checkbox item ───────────────────────────────── */
    .check-item {
      padding: 13px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: opacity .1s;
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .check-item:last-child { border-bottom: none; }
    .check-item:active { opacity: .6; }
    .check-box {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(0,0,0,.2);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all .15s;
    }
    .check-box.checked { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ─── Step indicator ──────────────────────────────── */
    .steps {
      display: flex; justify-content: center; gap: 6px; padding: 12px 0;
    }
    .step {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(0,0,0,.15); transition: all .2s;
    }
    .step.active { background: var(--accent); width: 20px; border-radius: 3px; }

    /* ─── Empty & Loading ─────────────────────────────── */
    .empty {
      text-align: center; padding: 60px 24px;
      color: var(--hint);
    }
    .empty-emoji { font-size: 52px; margin-bottom: 12px; }
    .empty-text { font-size: 16px; }
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 48px; color: var(--hint); font-size: 15px;
    }

    /* ─── Registration screen ─────────────────────────── */
    #screen-register {
      display: none;
      padding: 40px 20px 32px;
      min-height: 100vh;
      flex-direction: column;
    }
    .register-hero { text-align: center; margin-bottom: 36px; }
    .register-hero .hero-icon { font-size: 64px; margin-bottom: 14px; }
    .register-hero h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .register-hero p { color: var(--hint); font-size: 15px; }

    /* ─── FAB ─────────────────────────────────────────── */
    .fab {
      position: fixed; right: 18px; bottom: 84px; z-index: 40;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent); color: var(--btn-text);
      border: none; font-size: 26px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    .fab:active { opacity: .8; }

    /* ─── Toggle ──────────────────────────────────────── */
    .toggle-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 15px; font-weight: 500; }
    .toggle-sub { font-size: 13px; color: var(--hint); margin-top: 1px; }
    .toggle-switch {
      width: 48px; height: 28px; border-radius: 14px;
      display: flex; align-items: center; cursor: pointer;
      padding: 3px; transition: background .2s; flex-shrink: 0;
    }
    .toggle-switch.on { background: #34c759; }
    .toggle-switch.off { background: rgba(0,0,0,.2); }
    .toggle-knob {
      width: 22px; height: 22px; border-radius: 50%;
      background: #fff; transition: transform .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .toggle-switch.on .toggle-knob { transform: translateX(20px); }
  </style>
</head>
<body>

<!-- ─── REGISTRATION ─────────────────────────────── -->
<div id="screen-register">
  <div class="register-hero">
    <div class="hero-icon">🤝</div>
    <h1>Договорная торговля</h1>
    <p>Заполните данные для регистрации</p>
  </div>
  <div class="form-group">
    <label class="form-label">Полное имя (ФИО)</label>
    <input id="reg-name" class="input" type="text" placeholder="Иванов Иван Иванович">
  </div>
  <div class="form-group">
    <label class="form-label">Компания (необязательно)</label>
    <input id="reg-company" class="input" type="text" placeholder="ООО «Название»">
  </div>
  <div class="form-group">
    <label class="form-label">Роль</label>
    <select id="reg-role" class="input">
      <option value="buyer">🛒 Покупатель — создаю заявки</option>
      <option value="supplier">🏭 Поставщик — обрабатываю заявки</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="submitRegister()">Зарегистрироваться</button>
</div>

<!-- ─── MAIN APP ─────────────────────────────────── -->
<div id="app" style="display:none">
  <div class="header">
    <div class="header-title" id="header-title">Каталог</div>
    <div id="header-badge" style="display:none" class="header-badge"></div>
  </div>

  <!-- CATALOG -->
  <div id="page-catalog" class="page">
    <div id="catalog-content"></div>
  </div>

  <!-- CREATE ORDER — multi-step -->
  <div id="page-create" class="page">
    <div class="steps" id="order-steps">
      <div class="step active" id="step-dot-0"></div>
      <div class="step" id="step-dot-1"></div>
      <div class="step" id="step-dot-2"></div>
    </div>
    <div id="order-step-0">
      <div class="section">
        <div class="section-header">Выберите товары</div>
        <div class="list" id="order-product-list"></div>
      </div>
      <div class="section">
        <button class="btn btn-primary" onclick="orderNextStep()">Далее →</button>
      </div>
    </div>
    <div id="order-step-1" style="display:none">
      <div class="section">
        <div class="section-header">Укажите количество</div>
        <div id="qty-form"></div>
      </div>
      <div class="section">
        <button class="btn btn-primary" onclick="orderNextStep()">Далее →</button>
        <button class="btn btn-ghost btn-gap btn-sm" onclick="orderPrevStep()">← Назад</button>
      </div>
    </div>
    <div id="order-step-2" style="display:none">
      <div class="section">
        <div class="section-header">Детали заявки</div>
        <div class="form-group">
          <label class="form-label">Адрес доставки</label>
          <input id="order-address" class="input" placeholder="г. Москва, ул. Примерная, д. 1">
        </div>
        <div class="form-group">
          <label class="form-label">Желаемая дата поставки</label>
          <input id="order-date" class="input" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">Комментарий</label>
          <textarea id="order-comment" class="input" placeholder="Дополнительные пожелания..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="submitOrder()">✓ Отправить заявку</button>
        <button class="btn btn-ghost btn-gap btn-sm" onclick="orderPrevStep()">← Назад</button>
      </div>
    </div>
  </div>

  <!-- MY ORDERS -->
  <div id="page-orders" class="page">
    <div id="orders-content"></div>
  </div>

  <!-- NEW ORDERS (supplier) -->
  <div id="page-new-orders" class="page">
    <div id="new-orders-content"></div>
  </div>

  <!-- ADMIN: PRODUCTS -->
  <div id="page-admin-products" class="page">
    <div id="admin-products-content"></div>
    <button class="fab" onclick="openSheet('sheet-add-product')" title="Добавить товар">＋</button>
  </div>

  <!-- ADMIN: USERS -->
  <div id="page-admin-users" class="page">
    <div id="admin-users-content"></div>
  </div>

  <!-- ADMIN: ALL ORDERS -->
  <div id="page-admin-orders" class="page">
    <div id="admin-orders-content"></div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<!-- ─── SHEET: ORDER DETAIL ──────────────────────── -->
<div class="overlay" id="sheet-order" onclick="overlayClick(event,'sheet-order')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-order-body"></div>
  </div>
</div>

<!-- ─── SHEET: PRODUCT DETAIL ───────────────────── -->
<div class="overlay" id="sheet-product" onclick="overlayClick(event,'sheet-product')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-product-body"></div>
  </div>
</div>

<!-- ─── SHEET: ADD PRODUCT ──────────────────────── -->
<div class="overlay" id="sheet-add-product" onclick="overlayClick(event,'sheet-add-product')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">➕ Добавить товар</div>
    <div class="form-group">
      <label class="form-label">Название</label>
      <input id="np-name" class="input" placeholder="Цемент М500">
    </div>
    <div class="form-group">
      <label class="form-label">Описание</label>
      <input id="np-desc" class="input" placeholder="Краткое описание товара">
    </div>
    <div class="row">
      <div class="form-group">
        <label class="form-label">Единица</label>
        <input id="np-unit" class="input" placeholder="шт">
      </div>
      <div class="form-group">
        <label class="form-label">Мин. кол-во</label>
        <input id="np-min" class="input" type="number" placeholder="1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Цена за ед. (пусто = договорная)</label>
      <input id="np-price" class="input" type="number" placeholder="Договорная">
    </div>
    <button class="btn btn-primary" onclick="submitAddProduct()">Добавить</button>
    <button class="btn btn-ghost btn-gap btn-sm" onclick="closeSheet('sheet-add-product')">Отмена</button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ── State ──────────────────────────────────────────
let currentUser = null;
let cachedProducts = [];
let orderCart = {};   // {product_id: {name, unit, qty}}
let orderStep = 0;

// ── API helper ─────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(location.origin + path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'X-Telegram-Init-Data': tg.initData,
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

// ── Init ───────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(location.origin + '/api/auth', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({init_data: tg.initData}),
    });
    const data = await res.json();
    if (data.registered === false) {
      document.getElementById('reg-name').value = data.first_name || '';
      document.getElementById('screen-register').style.display = 'flex';
    } else {
      currentUser = data;
      showApp();
    }
  } catch (e) {
    document.body.innerHTML =
      `<div style="padding:40px;text-align:center">
         <div style="font-size:48px;margin-bottom:12px">⚠️</div>
         <div>${e.message}</div>
       </div>`;
  }
}

// ── Register ───────────────────────────────────────
async function submitRegister() {
  const full_name = document.getElementById('reg-name').value.trim();
  const company   = document.getElementById('reg-company').value.trim();
  const role      = document.getElementById('reg-role').value;
  if (!full_name) { tg.showAlert('Введите ваше имя'); return; }
  try {
    const res = await fetch(location.origin + '/api/auth', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({init_data: tg.initData, role, full_name, company}),
    });
    currentUser = await res.json();
    document.getElementById('screen-register').style.display = 'none';
    showApp();
  } catch (e) { tg.showAlert('Ошибка: ' + e.message); }
}

// ── App layout ──────────────────────────────────────
const NAV = {
  buyer:    [{id:'catalog',      icon:'📦', label:'Каталог'},
             {id:'create',       icon:'📝', label:'Заявка'},
             {id:'orders',       icon:'📋', label:'Мои заявки'}],
  supplier: [{id:'new-orders',   icon:'🆕', label:'Новые'},
             {id:'orders',       icon:'📋', label:'Принятые'}],
  admin:    [{id:'admin-products',icon:'📦',label:'Товары'},
             {id:'admin-users',   icon:'👥',label:'Люди'},
             {id:'admin-orders',  icon:'📋',label:'Заявки'}],
};
const PAGE_TITLE = {
  catalog:'Каталог товаров', create:'Создать заявку',
  orders:'Мои заявки', 'new-orders':'Новые заявки',
  'admin-products':'Управление товарами',
  'admin-users':'Пользователи',
  'admin-orders':'Все заявки',
};

function showApp() {
  document.getElementById('app').style.display = 'block';
  const tabs = NAV[currentUser.role] || NAV.buyer;
  document.getElementById('bottom-nav').innerHTML = tabs.map(t =>
    `<button class="nav-item" id="nav-${t.id}" onclick="navigate('${t.id}')">
       <span class="nav-icon">${t.icon}</span><span>${t.label}</span>
     </button>`
  ).join('');
  navigate(tabs[0].id);
}

function navigate(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const pg = document.getElementById('page-' + pageId);
  if (pg) pg.classList.add('active');
  const nb = document.getElementById('nav-' + pageId);
  if (nb) nb.classList.add('active');
  document.getElementById('header-title').textContent = PAGE_TITLE[pageId] || '';

  const loaders = {
    catalog: loadCatalog,
    create: loadCreateOrder,
    orders: loadMyOrders,
    'new-orders': loadNewOrders,
    'admin-products': loadAdminProducts,
    'admin-users': loadAdminUsers,
    'admin-orders': loadAdminOrders,
  };
  if (loaders[pageId]) loaders[pageId]();
}

// ── Catalog ────────────────────────────────────────
async function loadCatalog() {
  const el = document.getElementById('catalog-content');
  el.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    cachedProducts = await api('GET', '/api/products');
    if (!cachedProducts.length) {
      el.innerHTML = emptyState('📦', 'Каталог пуст'); return;
    }
    el.innerHTML = `<div class="section">
      <div class="list">${cachedProducts.map(p => `
        <div class="list-item" onclick="showProduct(${p.id})">
          <div class="list-item-icon">📦</div>
          <div class="list-item-body">
            <div class="list-item-title">${esc(p.name)}</div>
            <div class="list-item-sub">Ед.: ${esc(p.unit)} · Мин.: ${p.min_quantity} ${esc(p.unit)}</div>
          </div>
          <div class="list-item-right">
            <div class="list-item-price">${p.base_price ? p.base_price + ' ₽' : 'Договор.'}</div>
            <div class="chevron">›</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  } catch (e) { el.innerHTML = emptyState('⚠️', e.message); }
}

function showProduct(id) {
  const p = cachedProducts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('sheet-product-body').innerHTML = `
    <div class="sheet-title">📦 ${esc(p.name)}</div>
    <p style="color:var(--hint);font-size:14px;margin-bottom:14px">${esc(p.description || 'Описание отсутствует')}</p>
    <div class="list" style="margin-bottom:14px">
      ${detailRow('Единица измерения', p.unit)}
      ${detailRow('Мин. количество', p.min_quantity + ' ' + p.unit)}
      ${detailRow('Базовая цена', p.base_price ? p.base_price + ' ₽/' + p.unit : 'Договорная')}
    </div>
    <button class="btn btn-ghost" onclick="closeSheet('sheet-product')">Закрыть</button>`;
  openSheet('sheet-product');
}

// ── Create order ───────────────────────────────────
async function loadCreateOrder() {
  orderCart = {}; orderStep = 0;
  showOrderStep(0);
  const el = document.getElementById('order-product-list');
  el.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    if (!cachedProducts.length) cachedProducts = await api('GET', '/api/products');
    renderProductSelect();
  } catch (e) { el.innerHTML = emptyState('⚠️', e.message); }
}

function renderProductSelect() {
  document.getElementById('order-product-list').innerHTML =
    cachedProducts.map(p => `
      <div class="check-item" id="ci-${p.id}" onclick="toggleCart(${p.id})">
        <div class="check-box" id="cb-${p.id}"></div>
        <div class="list-item-body">
          <div class="list-item-title">${esc(p.name)}</div>
          <div class="list-item-sub">${esc(p.unit)}</div>
        </div>
      </div>`).join('');
}

function toggleCart(id) {
  const p = cachedProducts.find(x => x.id === id);
  if (!p) return;
  const cb = document.getElementById('cb-' + id);
  if (orderCart[id]) {
    delete orderCart[id];
    cb.classList.remove('checked'); cb.textContent = '';
  } else {
    orderCart[id] = {name: p.name, unit: p.unit, qty: null};
    cb.classList.add('checked'); cb.textContent = '✓';
  }
}

function orderNextStep() {
  if (orderStep === 0) {
    if (!Object.keys(orderCart).length) { tg.showAlert('Выберите хотя бы один товар'); return; }
    document.getElementById('qty-form').innerHTML = Object.entries(orderCart).map(([id, info]) => `
      <div class="form-group">
        <label class="form-label">${esc(info.name)} (${esc(info.unit)})</label>
        <input id="qty-${id}" class="input" type="number" min="0.01" step="0.1" placeholder="Количество">
      </div>`).join('');
    showOrderStep(1);
  } else if (orderStep === 1) {
    let ok = true;
    for (const id of Object.keys(orderCart)) {
      const v = parseFloat(document.getElementById('qty-' + id).value);
      if (!v || v <= 0) { ok = false; break; }
      orderCart[id].qty = v;
    }
    if (!ok) { tg.showAlert('Укажите количество для всех товаров'); return; }
    showOrderStep(2);
  }
}

function orderPrevStep() {
  showOrderStep(orderStep - 1);
}

function showOrderStep(n) {
  [0, 1, 2].forEach(i => {
    document.getElementById('order-step-' + i).style.display = i === n ? '' : 'none';
    const dot = document.getElementById('step-dot-' + i);
    if (dot) dot.className = 'step' + (i === n ? ' active' : '');
  });
  orderStep = n;
}

async function submitOrder() {
  const address = document.getElementById('order-address').value.trim();
  if (!address) { tg.showAlert('Введите адрес доставки'); return; }
  const items = Object.entries(orderCart).map(([pid, info]) => ({
    product_id: +pid, product_name: info.name, quantity: info.qty, unit: info.unit,
  }));
  try {
    const order = await api('POST', '/api/orders', {
      items,
      delivery_address: address,
      desired_date: document.getElementById('order-date').value || '',
      buyer_comment: document.getElementById('order-comment').value.trim(),
    });
    tg.showAlert(`✅ Заявка #${order.id} создана!\nПоставщики получат уведомление.`);
    navigate('orders');
  } catch (e) { tg.showAlert('Ошибка: ' + e.message); }
}

// ── Orders ─────────────────────────────────────────
const STATUS = {
  new:       {icon:'🆕', text:'Новая',           cls:'badge-new'},
  reviewing: {icon:'👀', text:'На рассмотрении', cls:'badge-reviewing'},
  accepted:  {icon:'✅', text:'Принята',          cls:'badge-accepted'},
  rejected:  {icon:'❌', text:'Отклонена',        cls:'badge-rejected'},
  completed: {icon:'✔️', text:'Выполнена',        cls:'badge-completed'},
};

async function loadMyOrders() {
  const el = document.getElementById('orders-content');
  el.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const orders = await api('GET', '/api/orders');
    renderOrderList(el, orders);
  } catch (e) { el.innerHTML = emptyState('⚠️', e.message); }
}

async function loadNewOrders() {
  const el = document.getElementById('new-orders-content');
  el.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const orders = await api('GET', '/api/orders/new');
    if (!orders.length) { el.innerHTML = emptyState('✅', 'Новых заявок нет'); return; }
    renderOrderList(el, orders, true);
  } catch (e) { el.innerHTML = emptyState('⚠️', e.message); }
}

function renderOrderList(el, orders, showBuyer = false) {
  if (!orders.length) { el.innerHTML = emptyState('📋', 'Заявок пока нет'); return; }
  el.innerHTML = `<div class="section"><div class="list">${orders.map(o => {
    const s = STATUS[o.status] || {icon:'📋',text:o.status,cls:'badge-new'};
    const preview = o.items.slice(0,2).map(i => `${i.product_name}: ${i.quantity} ${i.unit}`).join(', ');
    const buyer_line = showBuyer && o.buyer
      ? `<div class="list-item-sub">👤 ${esc(o.buyer.full_name)}${o.buyer.company?' · '+esc(o.buyer.company):''}</div>`
      : '';
    return `<div class="list-item" onclick="showOrderDetail(${o.id})">
      <div class="list-item-body">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-weight:600">Заявка #${o.id}</span>
          <span class="badge ${s.cls}">${s.icon} ${s.text}</span>
        </div>
        ${buyer_line}
        <div class="list-item-sub" style="margin-top:2px">${esc(preview)}${o.items.length>2?'…':''}</div>
        <div style="font-size:12px;color:var(--hint);margin-top:3px">${o.created_at.slice(0,10)}</div>
      </div>
    </div>`;
  }).join('')}</div></div>`;
}

// Keep orders cache for detail view
let ordersCache = [];

async function showOrderDetail(orderId) {
  try {
    let orders;
    if (currentUser.role === 'admin') orders = await api('GET', '/api/admin/orders');
    else orders = await api('GET', '/api/orders');
    // also try new orders for supplier
    if (currentUser.role === 'supplier') {
      const newOrd = await api('GET', '/api/orders/new').catch(() => []);
      orders = [...orders, ...newOrd.filter(x => !orders.find(o => o.id === x.id))];
    }
    const o = orders.find(x => x.id === orderId);
    if (!o) return;
    const s = STATUS[o.status] || {icon:'📋',text:o.status,cls:'badge-new'};
    const items_html = o.items.map(i =>
      `<div class="detail-row"><span class="detail-label">${esc(i.product_name)}</span><span class="detail-value">${i.quantity} ${esc(i.unit)}</span></div>`
    ).join('');

    let actions = '';
    if (currentUser.role === 'supplier' && o.status === 'new') {
      actions = `
        <button class="btn btn-success" onclick="doOrderAction(${o.id},'accepted')" style="margin-bottom:8px">✅ Принять заявку</button>
        <button class="btn btn-danger" onclick="askReject(${o.id})" style="margin-bottom:8px">❌ Отклонить</button>`;
    } else if (currentUser.role === 'supplier' && o.status === 'accepted') {
      actions = `<button class="btn btn-success" onclick="doOrderAction(${o.id},'completed')" style="margin-bottom:8px">✔️ Отметить выполненной</button>`;
    }

    document.getElementById('sheet-order-body').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="sheet-title" style="margin:0">Заявка #${orderId}</div>
        <span class="badge ${s.cls}">${s.icon} ${s.text}</span>
      </div>
      ${o.buyer?`<p style="font-size:14px;color:var(--hint);margin-bottom:12px">👤 ${esc(o.buyer.full_name)}${o.buyer.company?' · '+esc(o.buyer.company):''}</p>`:''}
      <div class="section-header" style="padding:0 0 6px">Товары</div>
      <div class="list" style="margin-bottom:12px">${items_html}</div>
      ${o.delivery_address?`<div class="list" style="margin-bottom:8px"><div class="detail-row"><span class="detail-label">📍 Адрес</span><span class="detail-value" style="text-align:right;max-width:60%">${esc(o.delivery_address)}</span></div></div>`:''}
      ${o.desired_date?`<div class="list" style="margin-bottom:8px"><div class="detail-row"><span class="detail-label">📅 Дата</span><span class="detail-value">${o.desired_date}</span></div></div>`:''}
      ${o.buyer_comment?`<div class="list" style="margin-bottom:8px"><div class="detail-row"><span class="detail-label">💬 Комментарий</span></div></div><div style="font-size:14px;color:var(--hint);padding:8px 12px;background:var(--bg2);border-radius:var(--radius);margin-bottom:8px">${esc(o.buyer_comment)}</div>`:''}
      ${o.supplier_comment?`<div style="font-size:14px;background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px">📝 ${esc(o.supplier_comment)}</div>`:''}
      ${actions}
      <button class="btn btn-ghost" onclick="closeSheet('sheet-order')">Закрыть</button>`;
    openSheet('sheet-order');
  } catch (e) { tg.showAlert('Ошибка: ' + e.message); }
}

async function doOrderAction(orderId, status, comment = '') {
  try {
    await api('PATCH', `/api/orders/${orderId}`, {status, supplier_comment: comment});
    closeSheet('sheet-order');
    const txt = {accepted:'принята ✅', rejected:'отклонена ❌', completed:'выполнена ✔️'};
    tg.showAlert(`Заявка #${orderId} ${txt[status]||status}`);
    navigate(currentUser.role === 'supplier' ? 'new-orders' : 'orders');
  } catch (e) { tg.showAlert('Ошибка: ' + e.message); }
}

function askReject(orderId) {
  tg.showPopup({
    title: 'Отклонение заявки',
    message: `Отклонить заявку #${orderId}? Укажите причину в следующем шаге.`,
    buttons: [{id:'yes',type:'destructive',text:'Отклонить'},{id:'no',type:'cancel'}]
  }, (btnId) => {
    if (btnId === 'yes') {
      const comment = window.prompt('Причина отклонения:') || '';
      doOrderAction(orderId, 'rejected', comment);
    }
  });
}

// ── Admin: products ─────────────────────────────────
async function loadAdminProducts() {
  const el = document.getElementById('admin-products-content');
  el.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const products = await api('GET', '/api/admin/products');
    if (!products.length) { el.innerHTML = emptyState('📦','Нет товаров'); return; }
    el.innerHTML = `<div class="section"><div class="list">${products.map(p => `
      <div class="toggle-row">
        <div>
          <div class="toggle-label">${esc(p.name)}</div>
          <div class="toggle-sub">${esc(p.unit)} · ${p.base_price ? p.base_price + ' ₽' : 'Договорная'}</div>
        </div>
        <div class="toggle-switch ${p.is_available?'on':'off'}" onclick="toggleProduct(${p.id})">
          <div class="toggle-knob"></div>
        </div>
      </div>`).join('')}</div></div>`;
  } catch (e) { el.innerHTML = emptyState('⚠️', e.message); }
}

async function toggleProduct(id) {
  try { await api('PATCH', `/api/admin/products/${id}/toggle`); loadAdminProducts(); }
  catch (e) { tg.showAlert('Ошибка: ' + e.message); }
}

async function submitAddProduct() {
  const name = document.getElementById('np-name').value.trim();
  if (!name) { tg.showAlert('Введите название'); return; }
  const price = document.getElementById('np-price').value;
  try {
    await api('POST', '/api/admin/products', {
      name,
      description: document.getElementById('np-desc').value.trim(),
      unit: document.getElementById('np-unit').value.trim() || 'шт',
      min_quantity: parseFloat(document.getElementById('np-min').value) || 1,
      base_price: price ? parseFloat(price) : null,
    });
    closeSheet('sheet-add-product');
    loadAdminProducts();
  } catch (e) { tg.showAlert('Ошибка: ' + e.message); }
}

// ── Admin: users ────────────────────────────────────
async function loadAdminUsers() {
  const el = document.getElementById('admin-users-content');
  el.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const users = await api('GET', '/api/admin/users');
    const icons = {buyer:'🛒',supplier:'🏭',admin:'⚙️'};
    const labels = {buyer:'Покупатель',supplier:'Поставщик',admin:'Админ'};
    el.innerHTML = `<div class="section"><div class="list">${users.map(u => `
      <div class="list-item" onclick="changeRole(${u.id},'${esc(u.full_name)}','${u.role}')">
        <div class="list-item-icon">${icons[u.role]||'👤'}</div>
        <div class="list-item-body">
          <div class="list-item-title">${esc(u.full_name)}</div>
          <div class="list-item-sub">${u.username?'@'+esc(u.username):'—'}${u.company?' · '+esc(u.company):''}</div>
        </div>
        <span class="badge badge-new">${labels[u.role]||u.role}</span>
      </div>`).join('')}</div></div>`;
  } catch (e) { el.innerHTML = emptyState('⚠️', e.message); }
}

function changeRole(userId, name, current) {
  tg.showPopup({
    title: name,
    message: `Текущая роль: ${current}\nВыберите новую роль:`,
    buttons: [
      {id:'buyer',text:'🛒 Покупатель'},
      {id:'supplier',text:'🏭 Поставщик'},
      {id:'admin',text:'⚙️ Администратор'},
      {id:'cancel',type:'cancel'},
    ]
  }, async (btnId) => {
    if (!btnId || btnId === 'cancel') return;
    try { await api('PATCH', `/api/admin/users/${userId}`, {role: btnId}); loadAdminUsers(); }
    catch (e) { tg.showAlert('Ошибка: ' + e.message); }
  });
}

// ── Admin: all orders ───────────────────────────────
async function loadAdminOrders() {
  const el = document.getElementById('admin-orders-content');
  el.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const orders = await api('GET', '/api/admin/orders');
    renderOrderList(el, orders, true);
  } catch (e) { el.innerHTML = emptyState('⚠️', e.message); }
}

// ── Sheet helpers ───────────────────────────────────
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function overlayClick(e, id) { if (e.target === e.currentTarget) closeSheet(id); }

// ── UI helpers ──────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function emptyState(emoji, text) {
  return `<div class="empty"><div class="empty-emoji">${emoji}</div><div class="empty-text">${esc(text)}</div></div>`;
}
function detailRow(label, value) {
  return `<div class="detail-row"><span class="detail-label">${esc(label)}</span><span class="detail-value">${esc(value)}</span></div>`;
}

// ── Start ───────────────────────────────────────────
init();
</script>
